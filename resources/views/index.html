<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>

    <style>
        #myPieChart{
            max-height: 400px;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <canvas id="myPieChart"></canvas>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const ctx = document.getElementById("myPieChart").getContext("2d");

// Load image
const img = new Image();
img.src = "./placeholder.jpg"; // Replace with your image URL
img.onload = function () {
    const pattern = ctx.createPattern(img, "repeat");

    const myChart = new Chart(ctx, {
        type: "pie",
        data: {
            labels: ["32%", "Others"],
            datasets: [{
                data: [32, 68],
                backgroundColor: [pattern, "#000"], // Apply image to first slice
                borderColor: "#FFF",
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            animation: {
                animateScale: true,
                animateRotate: true,
            },
            plugins: {
                legend: { display: false },
                tooltip: { enabled: true }
            }
        }
    });
};
</script>

</body>
</html>
